seed: 42

logging:
  wandb:
    enabled: false
    project: ecg-thesis
    entity: null
    run_name: null
    group: phase6-daeac-pseudo-filter
    mode: null
    tags: ["phase6", "daeac", "prototype_bank", "pseudo_filter", "confidence_global"]
    log_artifacts: false

paths:
  processed_dir: data/processed/phase6_daeac_paper
  output_dir: outputs/phase6_daeac_pseudo_filter_confidence_global

data:
  source_train: data/processed/phase6_daeac_paper/mitdb_ds1_daeac.npz
  source_eval: data/processed/phase6_daeac_paper/mitdb_ds1_daeac.npz
  target_unlabeled: data/processed/phase6_daeac_paper/mitdb_ds2_first5_unlabeled_daeac.npz
  target_test: data/processed/phase6_daeac_paper/mitdb_ds2_daeac.npz
  target_full_transductive: data/processed/phase6_daeac_paper/mitdb_ds2_daeac.npz
  external_targets:
    incart: data/processed/phase6_daeac_paper/incart_all_daeac.npz
    svdb: data/processed/phase6_daeac_paper/svdb_all_daeac.npz
  input_key: auto
  label_key: y
  class_names: ["N", "S", "V", "F"]
  num_classes: 4
  target_split_seconds: 300.0
  source_usage: full
  target_protocol: first5_adapt_full_test

model:
  num_classes: 4
  input_channels: 1
  initial_channels: 4
  dilations: [1, 6, 12, 18]
  feature_dim: 256
  se_reduction: 16
  dropout: 0.0

training:
  checkpoint_prefix: daeac_base
  epochs: 300
  batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true

adaptation:
  checkpoint_prefix: daeac_pseudo_filter_confidence_global
  init_checkpoint: outputs/phase6_daeac_paper/checkpoints/daeac_base_best.pt
  epochs: 300
  source_batch_size: 256
  target_batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true
  beta1: 0.1
  beta2: 0.1
  center_ema_gamma: 0.1
  margin: 5.0
  distance: l2
  pseudo_thresholds:
    N: 0.999
    S: 0.99
    V: 0.99
    F: 0.99

prototype_bank:
  enabled: true
  usage: weighted_global
  source_momentum: 0.90
  target_momentum: 0.99
  reliability_momentum: 0.90
  reliability_rule: coverage_x_confidence
  min_target_count: 4
  beta_max: 0.30
  rampup_epochs: 10
  near_all_n_ratio: 0.95
  fail_on_all_n: true
  all_n_patience_epochs: 2

pseudo_filter:
  enabled: true
  mode: confidence_global
  global_confidence_threshold: 0.99
  class_confidence_thresholds:
    N: 0.999
    S: 0.99
    V: 0.99
    F: 0.99
  max_normalized_entropy: 0.05
  near_all_n_ratio: 0.95
  fail_on_empty: true
  fail_on_all_n: true
  safety_patience_epochs: 2

comparison:
  variants:
    no_filter: outputs/phase6_daeac_pseudo_filter_no_filter
    confidence_global: outputs/phase6_daeac_pseudo_filter_confidence_global
    confidence_entropy: outputs/phase6_daeac_pseudo_filter_confidence_entropy
    class_specific: outputs/phase6_daeac_pseudo_filter_class_specific

evaluation:
  batch_size: 256
