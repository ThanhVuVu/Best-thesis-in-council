extends: phase6_daeac_fcba_latefusion_rr_nsv_daeac_ds1_ds2.yaml

logging:
  wandb:
    group: phase6_daeac_fcba_latefusion_rr_nsv_dann_ds1_ds2
    tags: ["phase6", "daeac", "fcba", "rr_late_fusion", "nsv", "dann", "ds1_ds2"]

paths:
  output_dir: outputs/phase6_daeac_fcba_latefusion_rr_nsv_dann_ds1_ds2

training:
  checkpoint_prefix: daeac_fcba_rr_nsv_dann_ds1_ds2
  init_checkpoint: outputs/phase6_daeac_fcba_latefusion_rr_nsv_sqrtw/checkpoints/daeac_fcba_rr_nsv_sqrtw_base_best.pt
  epochs: 50
  source_batch_size: 256
  target_batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true
  class_weight_mode: sqrt
  source_loss: weighted_ce
  optimizer: adam
  scheduler: step

dann:
  alpha: 1.0
  lambda_schedule: progressive
  fixed_lambda: 1.0
  warmup_epochs: 0
  num_domains: 2
  domain_hidden_dim: 128
  dropout: 0.3
