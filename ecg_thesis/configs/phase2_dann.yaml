seed: 42

paths:
  processed_dir: data/processed
  output_dir: outputs
  checkpoint_backup_dir: null

data:
  source_train: data/processed/mitbih_train.npz
  source_test: data/processed/mitbih_test.npz
  target_full: data/processed/incart_test.npz
  target_unlabeled: data/processed/incart_unlabeled.npz
  target_test: data/processed/incart_test_heldout.npz
  class_names: ["N", "S", "V"]
  num_classes: 3

incart_split:
  adapt_records: [
    "I01", "I02", "I03", "I04", "I05", "I06", "I07", "I08", "I09", "I10",
    "I11", "I12", "I13", "I14", "I15", "I16", "I17", "I18", "I19", "I20",
    "I21", "I22", "I23", "I24", "I25", "I26", "I27", "I28", "I29", "I30",
    "I31", "I32", "I33", "I34", "I35", "I36", "I37", "I38", "I39", "I40",
    "I41", "I42", "I43", "I44", "I45", "I46", "I47", "I48", "I49", "I50"
  ]
  test_records: [
    "I51", "I52", "I53", "I54", "I55", "I56", "I57", "I58", "I59", "I60",
    "I61", "I62", "I63", "I64", "I65", "I66", "I67", "I68", "I69", "I70",
    "I71", "I72", "I73", "I74", "I75"
  ]

model:
  backbone: inceptiontime1d
  embedding_dim: 128
  num_classes: 3
  num_domains: 2
  dropout: 0.3

source_only:
  enabled: true
  model: inceptiontime1d
  checkpoint_prefix: source_only_inception
  epochs: 50
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  use_class_weights: true
  early_stopping_patience: 10

training:
  epochs: 50
  source_batch_size: 64
  target_batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  source_loss: weighted_ce
  focal_gamma: 2.0
  use_class_weights: true
  early_stopping_patience: 10
  checkpoint_metric: source_val_macro_f1

dann:
  alpha: 0.2
  lambda_schedule: progressive
  gamma: 3.0
  fixed_lambda: 1.0
  warmup_epochs: 3
  source_init_checkpoint: outputs/checkpoints/source_only_inception_best.pt

evaluation:
  primary_metric: macro_f1
  save_predictions: true
  save_confusion_matrix: true
  focus_classes: ["S", "V"]

visualization:
  embedding_method: umap
  max_points_per_domain: 3000
