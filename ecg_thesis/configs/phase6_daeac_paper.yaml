seed: 42

logging:
  wandb:
    enabled: false
    project: ecg-thesis
    entity: null
    run_name: null
    group: phase6_daeac_paper
    mode: null
    tags: ["phase6", "daeac", "paper_faithful"]
    log_artifacts: false

paths:
  processed_dir: data/processed/phase6_daeac_paper
  output_dir: outputs/phase6_daeac_paper

data:
  source_train: data/processed/phase6_daeac_paper/mitdb_ds1_daeac.npz
  source_eval: data/processed/phase6_daeac_paper/mitdb_ds1_daeac.npz
  target_unlabeled: data/processed/phase6_daeac_paper/mitdb_ds2_first5_unlabeled_daeac.npz
  target_test: data/processed/phase6_daeac_paper/mitdb_ds2_daeac.npz
  input_key: x_daeac
  label_key: y
  class_names: ["N", "S", "V", "F"]
  num_classes: 4

model:
  num_classes: 4
  input_channels: 1
  initial_channels: 4
  dilations: [1, 6, 12, 18]
  feature_dim: 256
  se_reduction: 16
  dropout: 0.0

training:
  checkpoint_prefix: daeac_base
  epochs: 300
  batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true

adaptation:
  checkpoint_prefix: daeac_uda
  init_checkpoint: outputs/phase6_daeac_paper/checkpoints/daeac_base_latest.pt
  epochs: 300
  source_batch_size: 256
  target_batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true
  beta1: 0.1
  beta2: 0.1
  center_ema_gamma: 0.1
  margin: 5.0
  distance: l2
  pseudo_thresholds:
    N: 0.999
    S: 0.99
    V: 0.99
    F: 0.99

evaluation:
  batch_size: 256
  paper_targets:
    daeac_base:
      accuracy: 0.9462
      per_class_f1:
        N: 0.97
        V: 0.86
        S: 0.77
        F: 0.34
    daeac_uda:
      accuracy: 0.9759
      per_class_f1:
        N: 0.99
        V: 0.93
        S: 0.83
        F: 0.65
