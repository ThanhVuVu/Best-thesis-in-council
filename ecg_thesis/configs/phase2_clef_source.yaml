seed: 42

paths:
  processed_dir: data/processed
  output_dir: outputs/phase2_clef
  checkpoint_backup_dir: null

data:
  source_train: data/processed/mitbih_train.npz
  source_test: data/processed/mitbih_test.npz
  target_unlabeled: data/processed/incart_unlabeled.npz
  target_test: data/processed/incart_test_heldout.npz
  class_names: ["N", "S", "V"]
  num_classes: 3
  target_sampling_rate: 360
  beat_length: 250
  left_window_samples_360hz: 100
  right_window_samples_360hz: 150
  normalize: per_beat_zscore

model:
  backbone: clef_pretrained
  num_classes: 3
  model_size: small
  clef_checkpoint_path: models/clef/clef_small.ckpt
  in_channels: 1
  head_hidden_dim: 256
  dropout: 0.1
  encoder_lr: 0.00003
  freeze_encoder: true

source_only:
  enabled: true
  model: clef_pretrained
  checkpoint_prefix: clef_frozen
  epochs: 30
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  source_loss: weighted_ce
  focal_gamma: 2.0
  use_class_weights: true
  early_stopping_patience: 10

modes:
  clef_frozen:
    checkpoint_prefix: clef_frozen
    freeze_encoder: true
    lr: 0.001
    encoder_lr: 0.0
  clef_finetune:
    checkpoint_prefix: clef_finetune
    freeze_encoder: false
    lr: 0.001
    encoder_lr: 0.00003

evaluation:
  primary_metric: macro_f1
  save_predictions: true
  save_confusion_matrix: true
  focus_classes: ["S", "V"]
