seed: 42

logging:
  wandb:
    enabled: false
    project: ecg-thesis
    entity: null
    run_name: null
    group: phase6_daeac_tcn_attention_random_balance
    mode: null
    tags: ["phase6", "daeac", "hybrid", "mkmmd", "random_balance", "tcn_attention"]
    log_artifacts: false

paths:
  processed_dir: data/processed/phase6_daeac_paper
  output_dir: outputs/phase6_daeac_tcn_attention_random_balance

data:
  source_train: data/processed/phase6_daeac_balance/mitdb_ds1_daeac_random_v2_s5_f10.npz
  source_eval: data/processed/phase6_daeac_paper/mitdb_ds1_daeac.npz
  target_unlabeled: data/processed/phase6_daeac_paper/mitdb_ds2_first5_unlabeled_daeac.npz
  target_test: data/processed/phase6_daeac_paper/mitdb_ds2_daeac.npz
  external_targets:
    incart: data/processed/phase6_daeac_paper/incart_all_daeac.npz
    svdb: data/processed/phase6_daeac_paper/svdb_all_daeac.npz
  input_key: auto
  label_key: y
  class_names: ["N", "S", "V", "F"]
  num_classes: 4

balance:
  source_input: data/processed/phase6_daeac_paper/mitdb_ds1_daeac.npz
  random_oversample:
    output: data/processed/phase6_daeac_balance/mitdb_ds1_daeac_random_v2_s5_f10.npz
    multipliers:
      N: 1
      S: 5
      V: 2
      F: 10

model:
  num_classes: 4
  input_channels: 1
  initial_channels: 4
  dilations: [1, 6, 12, 18]
  feature_dim: 256
  se_reduction: 16
  dropout: 0.0
  temporal_head: tcn_attention
  temporal_channels: 256
  temporal_dilations: [1, 2, 4]
  temporal_dropout: 0.1
  temporal_kernel_size: 3
  temporal_pooling: attention

training:
  checkpoint_prefix: daeac_base_tcn_attention_random_balance
  epochs: 300
  batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true

adaptation:
  checkpoint_prefix: daeac_hybrid_mkmmd_tcn_attention_random_balance
  init_checkpoint: outputs/phase6_daeac_tcn_attention_random_balance/checkpoints/daeac_base_tcn_attention_random_balance_best.pt
  epochs: 30
  source_batch_size: 256
  target_batch_size: 256
  lr: 0.0005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true
  beta1: 0.1
  beta2: 0.1
  lambda_mmd: 0.05
  center_ema_gamma: 0.1
  margin: 5.0
  distance: l2
  align_loss: l2
  pseudo_thresholds:
    N: 0.995
    S: 0.99
    V: 0.995
    F: 0.9985
  mkmmd:
    estimator: linear_quad
    kernel_num: 33
    kernel_mul: 1.41421356237
    gamma_mode: fixed_median_subset
    gamma_sample_size: 4096
    gamma_min: 1.0e-6
    beta: uniform
    layers:
      transition_gap: 0.5
      gap_embed: 1.0

evaluation:
  batch_size: 256
