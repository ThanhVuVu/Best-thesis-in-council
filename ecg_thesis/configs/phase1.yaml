seed: 42

paths:
  mitbih_raw_dir: ../mit-bih-arrhythmia-database-1.0.0/mit-bih-arrhythmia-database-1.0.0
  incart_raw_dir: ../st-petersburg-incart-12-lead-arrhythmia-database-1.0.0/files
  processed_dir: data/processed
  output_dir: outputs
  checkpoint_backup_dir: null

data:
  source_dataset: mitbih
  target_dataset: incart
  target_sampling_rate: 360
  beat_length: 250
  left_window_samples_360hz: 100
  right_window_samples_360hz: 150
  normalize: per_beat_zscore
  use_processed_cache: true

lead_selection:
  mode: preferred_single
  preferred_leads:
    mitbih: ["MLII", "II"]
    incart: ["II", "MLII"]
  fallback_lead_index: 0

classes:
  names: ["N", "S", "V"]

training:
  model: resnet1d
  batch_size: 64
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  use_class_weights: true

scheduler:
  name: reduce_on_plateau
  monitor: macro_f1
  mode: max

evaluation:
  primary_metric: macro_f1
  save_confusion_matrix: true
  save_predictions: true

visualization:
  embedding_method: umap
  max_points_per_domain: 3000
