seed: 42

paths:
  processed_dir: data/processed
  output_dir: outputs/phase2_clef_dann
  checkpoint_backup_dir: null

data:
  source_train: data/processed/mitbih_train.npz
  source_test: data/processed/mitbih_test.npz
  target_full: data/processed/incart_test.npz
  target_unlabeled: data/processed/incart_unlabeled.npz
  target_test: data/processed/incart_test_heldout.npz
  class_names: ["N", "S", "V"]
  num_classes: 3
  target_sampling_rate: 360
  beat_length: 250
  left_window_samples_360hz: 100
  right_window_samples_360hz: 150
  normalize: per_beat_zscore

model:
  backbone: clef_pretrained
  num_classes: 3
  num_domains: 2
  model_size: small
  clef_checkpoint_path: models/clef/clef_small.ckpt
  in_channels: 1
  freeze_encoder: false
  reuse_backbone_classifier: true
  head_hidden_dim: 256
  dropout: 0.1
  encoder_lr: 0.00001

training:
  checkpoint_prefix: clef_dann_from_finetune
  epochs: 50
  source_batch_size: 64
  target_batch_size: 64
  lr: 0.0003
  domain_lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  source_loss: weighted_ce
  focal_gamma: 2.0
  use_class_weights: true
  early_stopping_patience: 10
  checkpoint_metric: source_val_macro_f1

dann:
  alpha: 0.2
  lambda_schedule: progressive
  gamma: 3.0
  fixed_lambda: 1.0
  warmup_epochs: 3
  source_init_checkpoint: outputs/phase2_clef/checkpoints/clef_finetune_best.pt
  require_source_init_checkpoint: true
  source_init_expected_model: clef_pretrained

evaluation:
  primary_metric: macro_f1
  save_predictions: true
  save_confusion_matrix: true
  focus_classes: ["S", "V"]

visualization:
  embedding_method: umap
  max_points_per_domain: 3000
