seed: 42

logging:
  wandb:
    enabled: false
    project: ecg-thesis
    entity: null
    run_name: null
    group: phase6_daeac_adversarial
    mode: null
    tags: ["phase6", "daeac", "adda"]
    log_artifacts: false

paths:
  processed_dir: data/processed/phase6_daeac_paper
  output_dir: outputs/phase6_daeac_adda
  checkpoint_backup_dir: null

data:
  source_train: data/processed/phase6_daeac_record_splits/ds1_train.npz
  source_eval: data/processed/phase6_daeac_record_splits/ds1_val.npz
  target_unlabeled: data/processed/phase6_daeac_record_splits/ds2_train.npz
  target_val: data/processed/phase6_daeac_record_splits/ds2_val.npz
  target_test: data/processed/phase6_daeac_record_splits/ds2_test.npz
  external_targets:
    incart: data/processed/phase6_daeac_record_splits/incart_test.npz
    svdb: data/processed/phase6_daeac_record_splits/svdb_test.npz
  input_key: auto
  label_key: y
  class_names: ["N", "S", "V", "F"]
  num_classes: 4

source_split:
  enabled: true
  mode: mitbih_fit_val_records
  note: "When source_train and source_eval point to the same DS1 file, split source by MIT-BIH records: first 18 train records for fit, last 4 train records for validation."

model:
  num_classes: 4
  input_channels: 1
  initial_channels: 4
  dilations: [1, 6, 12, 18]
  feature_dim: 256
  se_reduction: 16
  dropout: 0.0

training:
  checkpoint_prefix: daeac_adda
  init_checkpoint: outputs/phase6_daeac_paper/checkpoints/daeac_base_best.pt
  epochs: 50
  batch_size: 256
  target_encoder_lr: 0.005
  discriminator_lr: 0.005
  weight_decay: 0.0001
  early_stopping_patience: 300

adda:
  discriminator_hidden_dim: 256
  discriminator_hidden_dims: [256, 256]
  dropout: 0.1

evaluation:
  batch_size: 256

validation:
  method: ericsson_v_measure
  beta: 1.0
  min_epochs: 10
  patience: 10
  min_delta: 0.0001
