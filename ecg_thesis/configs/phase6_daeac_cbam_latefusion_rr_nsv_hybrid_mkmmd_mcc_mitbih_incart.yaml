extends: phase6_daeac_cbam_latefusion_rr_nsv_mitbih_sqrtw.yaml

logging:
  wandb:
    group: phase6_daeac_cbam_latefusion_rr_nsv_hybrid_mkmmd_mcc_mitbih_incart
    tags: ["phase6", "daeac", "cbam", "rr_late_fusion", "nsv", "hybrid_mkmmd_mcc", "mitbih_incart"]

paths:
  output_dir: outputs/phase6_daeac_cbam_latefusion_rr_nsv_hybrid_mkmmd_mcc_mitbih_incart

data:
  target_unlabeled: data/processed/phase6_daeac_record_splits_nsv/incart_train.npz
  target_val: data/processed/phase6_daeac_record_splits_nsv/incart_val.npz
  target_test: data/processed/phase6_daeac_record_splits_nsv/incart_test.npz

adaptation:
  checkpoint_prefix: daeac_cbam_rr_nsv_hybrid_mkmmd_mcc_mitbih_incart
  hybrid_mkmmd_mcc:
    enabled: true
  lambda_mmd: 0.05
  mkmmd:
    estimator: linear_quad
    kernel_num: 33
    kernel_mul: 1.41421356237
    gamma_mode: fixed_median_subset
    gamma_sample_size: 4096
    gamma_min: 1.0e-6
    beta: qp
    beta_update_interval: 1
    qp_epsilon: 0.001
    qp_momentum: 0.9
    qp_positivity_floor: 1.0e-8
    layers:
      gap_embed: 0.5
      late_fusion_hidden: 1.0
  mcc:
    mu: 0.05
    temperature: 2.5
