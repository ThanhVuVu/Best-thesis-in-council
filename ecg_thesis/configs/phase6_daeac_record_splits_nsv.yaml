seed: 42

paths:
  mitdb_raw_dir: data/raw/mit-bih-arrhythmia-database-1.0.0/mit-bih-arrhythmia-database-1.0.0
  incart_raw_dir: data/raw/st-petersburg-incart-12-lead-arrhythmia-database-1.0.0/files
  svdb_raw_dir: data/raw/mit-bih-supraventricular-arrhythmia-database-1.0.0
  bundle_dir: data/processed/phase6_daeac_record_splits_nsv
  output_dir: outputs/phase6_daeac_record_splits_nsv

data:
  class_names: ["N", "S", "V"]
  num_classes: 3

split:
  trials: 10000
  source:
    train: 0.8
    val: 0.2
  target:
    train: 0.6
    val: 0.2
    test: 0.2

filter:
  drop_classes_by_domain:
    ds1: ["F"]
    mitbih: ["F"]
    ds2: ["F"]
    incart: ["F"]
    svdb: ["F"]

mitdb:
  exclude_records: ["102", "104", "107", "217"]
  ds1: ["101", "106", "108", "109", "112", "114", "115", "116", "118", "119", "122", "124", "201", "203", "205", "207", "208", "209", "215", "220", "223", "230"]
  ds2: ["100", "103", "105", "111", "113", "117", "121", "123", "200", "202", "210", "212", "213", "214", "219", "221", "222", "228", "231", "232", "233", "234"]

preprocessing:
  unified_sampling_rate: 360
  resampling_algorithm: FFT-based scipy.signal.resample
  use_single_lead: true
  normalize: per_segment_zscore
  heartbeat_segment:
    start_after_previous_r_peak_seconds: 0.14
    end_after_current_r_peak_seconds: 0.28
    fixed_length: 128
  input_tensor:
    shape: [N, 1, 3, 128]
  rr_features:
    enabled: true

lead_selection:
  preferred_leads:
    mitdb: ["MLII", "II"]
    incart: ["II", "MLII"]
    svdb: ["MLII", "II", "ECG1"]
  fallback_lead_index: 0
