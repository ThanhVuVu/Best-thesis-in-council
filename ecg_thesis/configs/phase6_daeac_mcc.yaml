seed: 42

logging:
  wandb:
    enabled: false
    project: ecg-thesis
    entity: null
    run_name: null
    group: phase6_daeac_mcc
    mode: null
    tags: ["phase6", "daeac", "mcc"]
    log_artifacts: false

paths:
  processed_dir: data/processed/phase6_daeac_paper
  output_dir: outputs/phase6_daeac_mcc

data:
  source_train: data/processed/phase6_daeac_record_splits/ds1_train.npz
  source_eval: data/processed/phase6_daeac_record_splits/ds1_val.npz
  target_unlabeled: data/processed/phase6_daeac_record_splits/ds2_train.npz
  target_val: data/processed/phase6_daeac_record_splits/ds2_val.npz
  target_test: data/processed/phase6_daeac_record_splits/ds2_test.npz
  external_targets:
    incart: data/processed/phase6_daeac_record_splits/incart_test.npz
    svdb: data/processed/phase6_daeac_record_splits/svdb_test.npz
  input_key: auto
  label_key: y
  class_names: ["N", "S", "V", "F"]
  num_classes: 4
  source_usage: disjoint_record_fit
  target_protocol: first5_adapt_full_test

model:
  num_classes: 4
  input_channels: 1
  initial_channels: 4
  dilations: [1, 6, 12, 18]
  feature_dim: 256
  se_reduction: 16
  dropout: 0.0

training:
  checkpoint_prefix: daeac_base
  epochs: 300
  batch_size: 256
  lr: 0.005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true

adaptation:
  checkpoint_prefix: daeac_mcc
  init_checkpoint: outputs/phase6_daeac_paper/checkpoints/daeac_base_best.pt
  epochs: 50
  source_batch_size: 256
  target_batch_size: 256
  lr: 0.0005
  weight_decay: 0.0001
  lr_decay_gamma: 0.99
  lr_decay_every_steps: 200
  use_class_weights: true
  source_loss: weighted_cross_entropy
  model_selection: minimum_dev_risk
  epoch_driver: target_once
  mixed_domain_batchnorm: true
  mcc:
    mu: 1.0
    # Plain target softmax from the thesis MCC specification.
    temperature: 1.0
  dev:
    enabled: true
    interval_epochs: 1
    feature_batch_size: 1024
    hidden_dim: 256
    discriminator_epochs: 10
    batch_size: 2048
    lr: 0.001
    weight_decay: 0.0
    probability_eps: 0.000001
    variance_eps: 0.000000000001

evaluation:
  batch_size: 256

validation:
  method: ericsson_v_measure
  beta: 1.0
  min_epochs: 10
  patience: 5
  min_delta: 0.0001
