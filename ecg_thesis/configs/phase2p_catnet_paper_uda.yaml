seed: 42

paths:
  mitbih_raw_dir: ../mit-bih-arrhythmia-database-1.0.0/mit-bih-arrhythmia-database-1.0.0
  incart_raw_dir: ../st-petersburg-incart-12-lead-arrhythmia-database-1.0.0/files
  processed_dir: data/processed/phase2p_paper_preprocess
  output_dir: outputs
  checkpoint_backup_dir: null
  artifact_backup_dir: null

data:
  source_train: data/processed/phase2p_paper_preprocess/mitbih_train_paper.npz
  source_train_duplicated: data/processed/phase2p_paper_preprocess/mitbih_train_paper_duplicated.npz
  source_test: data/processed/phase2p_paper_preprocess/mitbih_test_paper.npz
  target_unlabeled: data/processed/phase2p_paper_preprocess/incart_unlabeled_paper.npz
  target_test: data/processed/phase2p_paper_preprocess/incart_heldout_paper.npz
  class_names: ["N", "S", "V"]
  num_classes: 3

incart_split:
  adapt_records: [
    "I01", "I02", "I03", "I04", "I05", "I06", "I07", "I08", "I09", "I10",
    "I11", "I12", "I13", "I14", "I15", "I16", "I17", "I18", "I19", "I20",
    "I21", "I22", "I23", "I24", "I25", "I26", "I27", "I28", "I29", "I30",
    "I31", "I32", "I33", "I34", "I35", "I36", "I37", "I38", "I39", "I40",
    "I41", "I42", "I43", "I44", "I45", "I46", "I47", "I48", "I49", "I50"
  ]
  test_records: [
    "I51", "I52", "I53", "I54", "I55", "I56", "I57", "I58", "I59", "I60",
    "I61", "I62", "I63", "I64", "I65", "I66", "I67", "I68", "I69", "I70",
    "I71", "I72", "I73", "I74", "I75"
  ]

paper_preprocess:
  denoise:
    method: bandpass
    low_hz: 3.0
    high_hz: 20.0
    order: 4
  resampling:
    target_fs: 256
    method: resample_poly
  segmentation:
    mode: source_mean_rr
    explicit_window_seconds: null

lead_selection:
  preferred_leads:
    mitbih: ["MLII", "II"]
    incart: ["II", "MLII"]
  fallback_lead_index: 0

duplication:
  additional_copies:
    N: 0
    S: 5
    V: 2

model:
  backbone: catnet_biclassifier
  d_model: 128
  num_heads: 4
  dff: 128
  num_transformer_layers: 1
  attention_reduction: 8
  dropout: 0.2
  time_feature_dim: 3
  classifier_hidden_dim: 128
  classifier_dropout: 0.2

training:
  protocol: phase2p_paper_preprocess_catnet_biclassifier_centroid_uda
  stages: ["source_pretrain", "cluster_source", "centroid_uda"]

source_pretrain:
  checkpoint_prefix: phase2p_catnet_source
  epochs: 50
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  use_class_weights: true
  early_stopping_patience: 10
  lambda_disc: 0.1
  dro_eta: 0.1
  use_duplicated_source: true

cluster_source:
  checkpoint_prefix: phase2p_catnet_cluster_source
  init_checkpoint: outputs/checkpoints/phase2p_catnet_source_best.pt
  epochs: 20
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  use_class_weights: true
  early_stopping_patience: 10
  compact_weight: 0.05
  separation_weight: 0.01
  separation_margin: 1.0
  classification_mode: final_logits

uda:
  checkpoint_prefix: phase2p_catnet_paper_uda
  init_checkpoint: outputs/checkpoints/phase2p_catnet_cluster_source_best.pt
  epochs: 50
  source_batch_size: 64
  target_batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  use_class_weights: true
  use_dro_for_source_ce: true
  dro_eta: 0.1
  discrepancy_weight: 0.0
  compact_source_weight: 0.05
  compact_target_weight: 0.05
  inter_domain_weight: 0.05
  running_combined_weight: 0.05
  separation_weight: 0.01
  separation_margin: 1.0
  warmup_epochs: 3

pseudolabel:
  confidence_thresholds:
    N: 0.99
    S: 0.90
    V: 0.95
  distance_threshold:
    mode: source_intra_class_quantile
    quantile: 0.95
  discrepancy_threshold:
    mode: source_mean
  min_target_per_class: 20

evaluation:
  batch_size: 128
  primary_metric: macro_f1
  save_predictions: true
  save_confusion_matrix: true
  focus_classes: ["S", "V"]
